<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Painel Admin | Valquiria & Marco</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚙️</text></svg>">
    <link rel="stylesheet" href="./admin.css">
</head>
<body>

    <!-- Auth Gate -->
    <div id="authGate" class="auth-gate">
        <div class="auth-card">
            <div class="auth-icon"><i class="fas fa-lock"></i></div>
            <h2>Painel Administrativo</h2>
            <p>Digite a senha de acesso para continuar.</p>
            <div class="auth-input-wrapper">
                <input type="password" id="authPassword" placeholder="Senha de acesso" autocomplete="off">
            </div>
            <button class="auth-btn" id="authSubmit">
                <span>Entrar</span>
                <i class="fas fa-arrow-right"></i>
            </button>
            <p id="authError" class="auth-error"></p>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboardContent" class="dashboard-hidden">
        <div class="ambient-light"></div>
        <div class="ambient-light two"></div>

        <div class="dashboard-container">
            <header>
                <div class="brand">
                    <div class="brand-icon"><i class="fas fa-ring"></i></div>
                    <div>
                        <span>Painel Administrativo</span>
                        <h1>Valquiria & Marco</h1>
                    </div>
                </div>
                <div class="header-actions">
                    <button class="refresh-btn" id="syncBtn">
                        <i class="fas fa-sync-alt"></i> <span>Sincronizar</span>
                    </button>
                    <button class="logout-btn" id="logoutBtn" title="Sair">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </header>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-users"></i></div>
                    <div class="stat-content">
                        <h3 id="totalGuests">0</h3>
                        <p>Total Geral</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-user-tie"></i></div>
                    <div class="stat-content">
                        <h3 id="totalAdults">0</h3>
                        <p>Adultos</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-child"></i></div>
                    <div class="stat-content">
                        <h3 id="totalChildren">0</h3>
                        <p>Crianças</p>
                    </div>
                </div>
                <div class="stat-card highlight">
                    <div class="stat-icon"><i class="fas fa-clipboard-check"></i></div>
                    <div class="stat-content">
                        <h3 id="totalRsvps">0</h3>
                        <p>Confirmados</p>
                    </div>
                </div>
            </div>

            <div class="table-section">
                <div class="section-header">
                    <h2>Lista de Convidados</h2>
                    <div class="search-wrapper">
                        <i class="fas fa-search"></i>
                        <input type="text" id="searchInput" placeholder="Buscar convidado...">
                    </div>
                </div>

                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Convidado</th>
                                <th>Acompanhantes</th>
                                <th>Crianças</th>
                                <th>Data</th>
                                <th style="text-align: center;">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="toast-container"></div>

        <div class="custom-modal-overlay" id="confirmModal">
            <div class="custom-modal">
                <div class="modal-icon"><i class="fas fa-trash-alt"></i></div>
                <h3 class="modal-title">Excluir Convidado?</h3>
                <p class="modal-text">Essa ação removerá o registro permanentemente.</p>
                <div class="modal-actions">
                    <button class="btn-modal btn-cancel" id="modalCancel">Cancelar</button>
                    <button class="btn-modal btn-confirm" id="confirmDeleteBtn">Confirmar Exclusão</button>
                </div>
            </div>
        </div>
    </div>

    <script src="./admin.js"></script>
</body>
</html>
